        // ১) তুই ৫টা পছন্দের সাবজেক্টের নাম লেখ। তারপর প্রোগ্রাম লিখে দেখ, কিভাবে লুপ ব্যবহার করে সব সাবজেক্টের নাম আলাদাভঅবে প্রিন্ট হবে।

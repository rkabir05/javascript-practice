<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Learning Javascript</title>
</head>

<body>


    <script>
        // ৮) একটা player অবজেক্ট বানা যেখানে name : 'Messi', team: 'Argentina', আর goals: 91 Object.values ব্যবহার করে সব ভ্যালু বের কর।

        const players = {
            name: 'Messi',
            team: 'Argentina',
            goals: 91,
        }
        const keys = Object.keys(players);
        for (const key of keys) {
            console.log(key, players[key]);
        }
    </script>

</body>

</html>

    // প্রাকটিস : (push & pop)

    // 1) সংখ্যার একটা অ্যারে আছে : [১০, ২০, ৩০, ৪০, ৫০]। এখনই এই অ্যারেতে ৬০ যোগ করে অ্যারেটি আউটপুট দেখা।

    const numbers = [10, 20, 30, 40, 50];
    numbers.push(60)
    console.log(numbers);

    // ২) তুই ছিু নাম লিখে রাখছিস অ্যঅরেতে: "Shajib", "Sagor", "Shakil", "Sohel"। এখন তোর মনে হলো নতুন বন্ধু "Shumon"কে যোগ করতে হবে। একটা প্রোগ্রাম লিখে দেখ, সুমনকে সবার শেষে যোগ কর।

    const friends = ["Shajib", "Sagor", "Shakil", "Sohel"];
    friends.push("Shumon");
    console.log(friends);


    // ৩) তোর মোবাইলে যে যে গেম ইনস্টল করা আছে, সেগুলো একটা অ্যারেতে রাখ। তারপর সবার শেষ যে গেমের নাম দেওয়া আছে , সেটা রিমুভ করে ফেল। এরপর তোর অ্যারেতে কি কি গেম বাকি রইলে সেগুলো আউটপুট হিসেবে দেখা।

        const games = ["Pabji", "Candy Crash", "Football", "Cricket", "Fight"]
        games.pop();
        console.log(games);

    // ৪) এই অ্যারেতে [24, 36, 48, 60]। একদম প্রেথম উপাদান হিসেবে ১২-কে যোগ করে পুরা অ্যরেটা আউটপুট হিসেবে দেখা।

    const addNumber = [24, 36, 48, 60];
    addNumber.unshift(12);
    console.log(addNumber)
